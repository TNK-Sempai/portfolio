<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculatrice — Monique V2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0;user-select:none}

:root{
  --lime:#c8f060;
  --bg:#080808;
  --surface:rgba(14,14,14,0.88);
  --border:rgba(200,240,96,0.15);
  --text:#f0f0f0;
  --muted:#444;
  --red:#ff5c5c;
}

html,body{height:100%;overflow:hidden;background:var(--bg)}

body{
  display:grid;
  place-items:center;
  font-family:'Space Mono',monospace;
}

canvas#bg{
  position:fixed;inset:0;
  z-index:0;pointer-events:none;
}

.wrapper{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;gap:1.5rem;
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,4vw,3rem);
  letter-spacing:.12em;color:var(--text);
  text-align:center;line-height:1;
}
h1 em{
  color:var(--lime);font-style:normal;
  text-shadow:0 0 40px rgba(200,240,96,.5);
}

.calc{
  width:300px;
  background:var(--surface);
  border:1px solid var(--border);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  padding:1.25rem;
  display:flex;flex-direction:column;gap:.875rem;
  position:relative;overflow:hidden;
}

.calc::before{
  content:'';position:absolute;
  top:-1px;left:10%;width:80%;height:2px;
  background:linear-gradient(90deg,transparent,var(--lime),transparent);
  animation:topline 3s ease-in-out infinite;
}
@keyframes topline{
  0%,100%{opacity:.4;left:10%;width:80%}
  50%{opacity:1;left:5%;width:90%}
}

.corner{
  position:absolute;width:12px;height:12px;
  border-color:var(--lime);border-style:solid;opacity:.5;
}
.corner.tl{top:6px;left:6px;border-width:1px 0 0 1px}
.corner.tr{top:6px;right:6px;border-width:1px 1px 0 0}
.corner.bl{bottom:6px;left:6px;border-width:0 0 1px 1px}
.corner.br{bottom:6px;right:6px;border-width:0 1px 1px 0}

.scan-line{
  position:absolute;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(200,240,96,.07),transparent);
  animation:scan 4s linear infinite;pointer-events:none;z-index:10;
}
@keyframes scan{
  0%{top:-2px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}
}

.infos{
  min-height:1em;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--red);text-align:right;
}

.screen{
  background:rgba(0,0,0,.65);
  border:1px solid var(--border);
  padding:.875rem 1rem;
  display:flex;flex-direction:column;align-items:flex-end;
  gap:.2rem;min-height:86px;justify-content:flex-end;
  position:relative;overflow:hidden;
}
.screen::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(200,240,96,.015) 2px,rgba(200,240,96,.015) 4px);
  pointer-events:none;
}

.screen .expr{font-size:10px;color:var(--muted);letter-spacing:.08em;min-height:1em}

.screen .val{
  font-family:'Bebas Neue',sans-serif;
  font-size:2.6rem;letter-spacing:.06em;
  color:var(--text);line-height:1;word-break:break-all;
  transition:color .15s;
}
.screen .val.lit{
  color:var(--lime);
  text-shadow:0 0 30px rgba(200,240,96,.6),0 0 60px rgba(200,240,96,.2);
  animation:pulse-val .4s ease;
}
@keyframes pulse-val{0%{transform:scale(1.05)}100%{transform:scale(1)}}

.label-line{
  display:flex;align-items:center;gap:.5rem;
}
.label-line span{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:rgba(200,240,96,.25)}
.label-line::before,.label-line::after{content:'';flex:1;height:1px;background:var(--border)}

.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
}

.btn{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  color:var(--text);
  font-family:'Bebas Neue',sans-serif;
  font-size:1.35rem;letter-spacing:.06em;
  height:60px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:border-color .15s,background .15s,color .15s,transform .08s;
  display:flex;align-items:center;justify-content:center;
}
.btn:hover{background:rgba(200,240,96,.06);border-color:rgba(200,240,96,.25);color:var(--lime)}
.btn:active{transform:scale(0.94)}

.btn .ripple{
  position:absolute;border-radius:50%;
  width:60px;height:60px;
  background:rgba(200,240,96,.15);
  transform:scale(0);
  animation:ripple .45s linear;pointer-events:none;
}
@keyframes ripple{to{transform:scale(4);opacity:0}}

.btn.op{color:var(--lime);border-color:rgba(200,240,96,.12);font-size:1.5rem}
.btn.op:hover{background:rgba(200,240,96,.08);border-color:rgba(200,240,96,.4);text-shadow:0 0 12px var(--lime)}

.btn.equal{
  background:var(--lime);color:#080808;
  border-color:var(--lime);font-size:1.6rem;
}
.btn.equal:hover{background:#d8ff70;box-shadow:0 0 24px rgba(200,240,96,.4);color:#080808}
.btn.equal:active{transform:scale(0.91)}

.btn.clear{
  grid-column:span 4;height:40px;font-size:.75rem;
  letter-spacing:.3em;color:var(--muted);
  background:transparent;border-color:rgba(255,255,255,.04);
}
.btn.clear:hover{color:var(--red);border-color:rgba(255,92,92,.3);background:rgba(255,92,92,.04)}

.tag{
  font-size:8px;letter-spacing:.25em;text-transform:uppercase;
  color:rgba(200,240,96,.18);text-align:center;padding-top:.2rem;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrapper">
  <h1>Une Calculatrice <em>Pour Monique</em></h1>

  <div class="calc">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>

    <p class="infos" id="infos"></p>

    <div class="screen">
      <span class="expr" id="expr"></span>
      <span class="val" id="display">0</span>
    </div>

    <div class="label-line"><span>input</span></div>

    <div class="grid">
      <button class="btn" onclick="appendVal('7');spark(this)">7</button>
      <button class="btn" onclick="appendVal('8');spark(this)">8</button>
      <button class="btn" onclick="appendVal('9');spark(this)">9</button>
      <button class="btn op" onclick="appendVal('+');spark(this)">+</button>

      <button class="btn" onclick="appendVal('4');spark(this)">4</button>
      <button class="btn" onclick="appendVal('5');spark(this)">5</button>
      <button class="btn" onclick="appendVal('6');spark(this)">6</button>
      <button class="btn op" onclick="appendVal('-');spark(this)">−</button>

      <button class="btn" onclick="appendVal('1');spark(this)">1</button>
      <button class="btn" onclick="appendVal('2');spark(this)">2</button>
      <button class="btn" onclick="appendVal('3');spark(this)">3</button>
      <button class="btn op" onclick="appendVal('*');spark(this)">×</button>

      <button class="btn" onclick="appendVal('0');spark(this)">0</button>
      <button class="btn" onclick="appendVal('.');spark(this)">.</button>
      <button class="btn equal" onclick="calcule();spark(this)">=</button>
      <button class="btn op" onclick="appendVal('/');spark(this)">÷</button>

      <button class="btn clear" onclick="suppr()">— effacer —</button>
    </div>
    <p class="tag">Tanuki Corporation &copy; 2025</p>
  </div>
</div>

<script>
const display = document.getElementById('display')
const exprEl  = document.getElementById('expr')
const infosEl = document.getElementById('infos')
let current='', justCalc=false

function setInfos(msg){
  infosEl.textContent=msg
  if(msg) setTimeout(()=>infosEl.textContent='',2500)
}
function updateDisplay(){
  display.textContent=current||'0'
  display.classList.remove('lit')
}
function appendVal(v){
  if(justCalc&&!isNaN(v)&&v!=='.') current=''
  justCalc=false
  const ops=['+','-','*','/']
  if(ops.includes(v)&&ops.includes(current.slice(-1))) current=current.slice(0,-1)
  if(v==='.'&&current.slice(-1)==='.') return
  if(v==='.'&&current==='') current='0'
  current+=v
  updateDisplay()
}
function calcule(){
  if(!current){setInfos('// no input');return}
  try{
    exprEl.textContent=current+' ='
    const res=Function('"use strict";return('+current+')')()
    current=parseFloat(res.toFixed(10)).toString()
    display.textContent=current
    display.classList.add('lit')
    justCalc=true
  }catch{
    setInfos('// syntax error')
    current=''
    updateDisplay()
  }
}
function suppr(){
  current='';justCalc=false
  exprEl.textContent=''
  updateDisplay()
  display.classList.remove('lit')
}
function spark(btn){
  const r=document.createElement('span')
  r.className='ripple'
  btn.appendChild(r)
  setTimeout(()=>r.remove(),460)
}

/* ── CANVAS BG ── */
const canvas=document.getElementById('bg')
const ctx=canvas.getContext('2d')
const LIME='200,240,96'
const N=60
let W,H,particles
const mouse={x:-999,y:-999}

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}

function mkP(){
  return{
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.38,vy:(Math.random()-.5)*.38,
    r:Math.random()*1.6+.4,
    phase:Math.random()*Math.PI*2
  }
}

function init(){resize();particles=Array.from({length:N},mkP)}
window.addEventListener('resize',init)
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY})

const GLYPHS=['+','−','×','÷','=','%','∑','π','∞','λ']

function draw(){
  ctx.clearRect(0,0,W,H)

  /* grid */
  ctx.lineWidth=.5
  ctx.strokeStyle=`rgba(${LIME},.025)`
  const gs=80
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.phase+=.012
    if(p.x<0||p.x>W)p.vx*=-1
    if(p.y<0||p.y>H)p.vy*=-1
    const dx=p.x-mouse.x,dy=p.y-mouse.y
    const d=Math.sqrt(dx*dx+dy*dy)
    if(d<130){p.x+=dx/d*.9;p.y+=dy/d*.9}
    const a=.25+Math.sin(p.phase)*.18
    ctx.beginPath()
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
    ctx.fillStyle=`rgba(${LIME},${a})`
    ctx.fill()
  })

  /* connections */
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const a=particles[i],b=particles[j]
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy)
      if(d<120){
        ctx.beginPath()
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y)
        ctx.strokeStyle=`rgba(${LIME},${(1-d/120)*.13})`
        ctx.lineWidth=.6
        ctx.stroke()
      }
    }
  }

  /* floating math glyphs */
  ctx.font='13px "Bebas Neue",monospace'
  ctx.textAlign='center'
  particles.forEach((p,i)=>{
    if(i%6===0){
      const a=.04+Math.sin(p.phase*.6)*.035
      ctx.fillStyle=`rgba(${LIME},${a})`
      ctx.fillText(GLYPHS[i%GLYPHS.length],p.x,p.y)
    }
  })

  requestAnimationFrame(draw)
}

init();draw()
</script>
</body>
</html>
